<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestro Equipo | Asociación Wawanakan Kusisinapa</title>
  <meta name="description" content="El directorio institucional de la Asociación Wawanakan Kusisinapa: las personas que lideran el trabajo por la primera infancia.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Asociación Wawanakan Kusisinapa">
  <meta property="og:title" content="Nuestro Equipo | Asociación Wawanakan Kusisinapa">
  <meta property="og:description" content="El directorio institucional de la Asociación Wawanakan Kusisinapa: las personas que lideran el trabajo por la primera infancia.">
  <meta property="og:image" content="https://asociacionwawanakan-eng.github.io/asociaci-nwawanakan/assets/institucional/logotipo.png">
  <meta property="og:url" content="https://asociacionwawanakan-eng.github.io/asociaci-nwawanakan/nuestro-equipo.html">
  <link rel="icon" href="assets/institucional/logotipo.png" type="image/png">
  <link rel="canonical" href="https://asociacionwawanakan-eng.github.io/asociaci-nwawanakan/nuestro-equipo.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="page-main equipo-page">
    <section class="equipo-section" aria-labelledby="equipo-title">
      <div class="equipo-bg-overlay" aria-hidden="true"></div>
      <div class="equipo-glass">
        <div class="equipo-header">
          <div class="equipo-copy">
            <div class="equipo-brand">
              <strong>WAWANAKAN</strong>
              <span data-cms-text="equipo.brandTagline">Por la niñez, por el futuro.</span>
            </div>
            <h1 id="equipo-title">Nuestro Equipo</h1>
            <div class="equipo-title-line" aria-hidden="true"><span></span></div>
            <p data-cms-text="equipo.subtitulo">Gestión transparente para una niñez con oportunidades.</p>
          </div>
          <figure class="equipo-photo">
            <img src="assets/equipo/equipo.png" data-cms-src="equipo.fotoGrupal" alt="Equipo institucional de la Asociación Wawanakan Kusisiñapa">
          </figure>
        </div>

        <h2 class="sr-only">Directorio institucional</h2>
        <div class="equipo-separator" aria-hidden="true">
          <span></span>
          <strong>DIRECTORIO</strong>
          <span></span>
        </div>

        <div class="directorio-grid" id="directorio-grid"></div>

        <p class="equipo-closing" data-cms-text="equipo.cierre">Acompañamos hoy, transformamos el mañana.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer" aria-label="Pie de pagina institucional"></footer>


  <script src="js/diagnostics.js"></script>
  <script src="js/components.js"></script>
<script>WawaComponents.renderHeader("nuestro-equipo.html"); WawaComponents.renderFooter();</script>
<script src="js/main.js"></script>
<script type="module" src="js/firebase-content.js"></script>
<script>
  (function () {
    const DECORATORS = ["✦", "◆", "✧"];
    const esc = (s) => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");

    function renderDirectorio(members) {
      const grid = document.getElementById("directorio-grid");
      if (!grid || !Array.isArray(members) || !members.length) return;
      grid.innerHTML = members.map((m, i) => `
        <article class="flip-card directory-card" tabindex="0">
          <div class="flip-card-inner directory-card-inner">
            <div class="flip-card-front directory-card-face directory-card-front">
              <img src="${esc(m.foto || "assets/equipo/equipo.png")}" loading="lazy" alt="${esc(m.nombre)}">
              <div class="directory-card-content">
                <h3>${esc(m.nombre)}</h3>
                <p class="directory-role">${esc(m.cargo)}</p>
              </div>
            </div>
            <div class="flip-card-back directory-card-face directory-card-back">
              <span aria-hidden="true">${DECORATORS[i % DECORATORS.length]}</span>
              <h3>${esc(m.cargo)}</h3>
              <p>${esc(m.descripcionCargo)}</p>
            </div>
          </div>
        </article>`).join("");
    }

    document.addEventListener("wawa:content-ready", (e) => renderDirectorio(e.detail && e.detail.directorio));
    document.addEventListener("wawa:content-updated", (e) => renderDirectorio(e.detail && e.detail.directorio));
  })();
</script>
</body>
</html>
